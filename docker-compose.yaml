version: '3'

services:
  db:
    image: mariadb
    restart: always
    ports:
      - "3308:3306"
    environment:
      MARIADB_ROOT_PASSWORD: example
    volumes:
      - db_data:/var/lib/mysql

  adminer:
    image: adminer
    restart: always
    ports:
      - "8083:8080"

volumes:
  db_data:
    driver: local