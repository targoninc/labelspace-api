version: '3'

services:
  db:
    image: mariadb
    restart: always
    ports:
      - "3308:3306"
    environment:
      MARIADB_ROOT_PASSWORD: example
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:latest
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: always
    ports:
      - "6666:6379"
    volumes:
      - redis_data:/data
      - /home/loudar/redis.conf:/usr/local/etc/redis/redis.conf

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local